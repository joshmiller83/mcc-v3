id: mcc_calendar_event
label: 'MCC Calendar Events'
migration_group: mcc
migration_dependencies:
  required:
    - mcc_user
    - mcc_media_image
    - mcc_media_document
    - mcc_taxonomy
    - mcc_ministry
    - mcc_bio
source:
  plugin: d7_node
  node_type: calendar_item
process:
  nid: nid
  vid: vid
  title: title
  uid: node_uid
  status: status
  created: created
  changed: changed
  body: body
  # Drupal 7 stores each field value as a delta-indexed array of columns, so
  # the "field/column" shorthand can't reach the column. sub_process iterates
  # every delta and looks up its migrated destination id.
  field_featured_image:
    plugin: sub_process
    source: field_featured_image
    process:
      target_id:
        plugin: migration_lookup
        migration: mcc_media_image
        source: fid
  field_attachments:
    plugin: sub_process
    source: field_attachments
    process:
      target_id:
        plugin: migration_lookup
        migration: mcc_media_document
        source: fid
  field_bio_reference:
    plugin: sub_process
    source: field_bio_reference
    process:
      target_id:
        plugin: migration_lookup
        migration: mcc_bio
        source: target_id
  field_mission_category:
    plugin: sub_process
    source: field_mission_category
    process:
      target_id:
        plugin: migration_lookup
        migration: mcc_taxonomy
        source: tid
  field_related_ministry:
    plugin: sub_process
    source: field_related_ministry
    process:
      target_id:
        plugin: migration_lookup
        migration: mcc_ministry
        source: target_id
  field_event_date:
    -
      plugin: d7_dates_to_utc
      source: field_date
    -
      plugin: parse_dates
      entity_type: node
      bundle: calendar_event
destination:
  plugin: 'entity:node'
  default_bundle: calendar_event
